<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Furniture Store</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
header{background:#222;color:#fff;padding:15px;text-align:center}
.products{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;padding:20px}
.card{background:#fff;padding:10px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.card img{width:100%;height:150px;object-fit:cover}
button{width:100%;padding:8px;background:#222;color:white;border:none}
</style>
</head>
<body>

<header>
<h2>🛋️ Furniture Store</h2>
</header>

<div class="products" id="products"></div>

<script>
let products = [
{name:"Диван", price:250000},
{name:"Стол", price:80000},
{name:"Шкаф", price:180000},
{name:"Кровать", price:220000},
{name:"Кресло", price:90000},
{name:"Тумба", price:50000},
{name:"Комод", price:120000},
{name:"Полка", price:40000},
{name:"Стул", price:30000},
{name:"Офисный стол", price:110000}
];

let container = document.getElementById("products");

products.forEach(p=>{
let div = document.createElement("div");
div.className="card";
div.innerHTML=`
<img src="https://via.placeholder.com/300">
<h3>${p.name}</h3>
<p>${p.price} ₸</p>
<button>Купить</button>
`;
container.appendChild(div);
});
</script>

</body>
</html>
